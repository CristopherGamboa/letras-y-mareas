<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letras y Mareas - San Antonio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="body-bg d-flex min-vh-100">
    <main class="container d-flex justify-content-center align-items-center flex-grow-1 py-5">
        <div class="card border-0 shadow" style="max-width: 400px; width: 100%;">
            <div class="card-body bg-white rounded p-4">

                <!-- Sin sesión: inicio y recuperación -->
                <div id="login-section" style="display: none;">
                    <img src="../assets/img/logo.png" alt="Logo" width="100" class="img-fluid mx-auto d-block mb-4">
                    <form id="login-form">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control text-white" id="login-email" required>
                            <label for="login-email" class="form-label text-white">Correo electrónico</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control text-white" id="login-password" required>
                            <label for="login-password" class="form-label text-white">Contraseña</label>
                        </div>
                        <button type="submit" class="btn btn-primary rounded-0 w-100 mb-3">Ingresar</button>
                    </form>

                    <div class="text-success mb-3 d-none text-center" id="login-success">
                        ¡Has iniciado sesión correctamente!
                    </div>

                    <div class="d-flex justify-content-between">
                        <button id="show-recover-btn" class="custom-link btn btn-link p-0">¿Olvidaste tu contraseña?</button>
                        <a href="../user.html" class="custom-link btn btn-link p-0">Volver</a>
                    </div>
                </div>

                <!-- Recuperar contraseña -->
                <div id="recover-section" style="display: none;">
                    <h3 class="card-title mb-4 text-center">Recuperar Contraseña</h3>
                    <form id="recover-form">
                        <div class="mb-3 form-floating">
                            <input type="email" class="form-control text-white" id="recover-email" required>
                            <label for="recover-email" class="form-label text-white">Correo electrónico</label>
                        </div>
                        <button type="submit" class="btn btn-primary rounded-0 w-100 mb-3">Enviar enlace</button>
                    </form>

                    <div class="text-success d-none mb-3 text-center" id="recover-success">
                        Se ha enviado un enlace de recuperación a tu correo electr&oacute;nico.
                    </div>
                    
                    <button id="back-to-login-from-recover" class="custom-link btn btn-link w-100">Volver al inicio de sesión</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
